<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>컨셉 5 · 플레이풀 팝</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:"Pretendard Variable",Pretendard,sans-serif; }
  body { background:#f2e9cf; }
  .banner { text-align:center; font-size:12px; color:#8a7c55; padding:10px; }
  .app { max-width:400px; margin:0 auto; min-height:96vh; background:#fff6d9; position:relative; padding-bottom:88px; border-radius:24px; overflow:hidden; box-shadow:0 10px 40px rgba(120,100,30,.15); }
  main { padding:48px 20px 24px; }
  .greet { font-size:14px; font-weight:800; color:#ff6b6b; }
  h1 { font-size:29px; font-weight:900; line-height:1.3; color:#1f2430; margin-top:6px; letter-spacing:-.5px; }
  h1 .hl { background:linear-gradient(transparent 62%, #ffd93d 62%); }
  .label { font-size:13px; font-weight:800; color:#8a7c55; margin:22px 0 10px; }
  .chips { display:flex; flex-wrap:wrap; gap:8px; }
  .chip { height:38px; padding:0 14px; border-radius:999px; font-size:14px; font-weight:700; border:2px solid #1f2430; background:#fff; color:#1f2430; box-shadow:2px 2px 0 #1f2430; }
  .chip.on { background:#ff6b6b; color:#fff; }
  .cta { width:100%; height:58px; margin-top:30px; border:2px solid #1f2430; border-radius:18px; font-size:18px; font-weight:900; color:#1f2430;
         background:#ffd93d; box-shadow:5px 5px 0 #1f2430; }
  .card { margin-top:26px; background:#fff; border:2px solid #1f2430; border-radius:22px; padding:24px; box-shadow:6px 6px 0 #1f2430; position:relative; animation:pop .4s cubic-bezier(.16,1,.3,1); }
  @keyframes pop { from { opacity:0; transform:scale(.94) rotate(-1deg);} to { opacity:1; transform:none;} }
  .sticker { position:absolute; top:-14px; left:18px; background:#ff6b6b; color:#fff; font-size:13px; font-weight:900; padding:6px 12px;
             border:2px solid #1f2430; border-radius:999px; transform:rotate(-4deg); box-shadow:2px 2px 0 #1f2430; }
  .dish-row { display:flex; align-items:center; gap:14px; margin-top:10px; }
  .dish-emoji { width:60px; height:60px; border-radius:18px; background:#fff6d9; border:2px solid #1f2430; display:flex; align-items:center; justify-content:center; font-size:32px; }
  .dish-name { font-size:26px; font-weight:900; color:#1f2430; letter-spacing:-.5px; }
  .badges { display:flex; flex-wrap:wrap; gap:6px; margin-top:14px; }
  .badge { font-size:12px; font-weight:800; padding:4px 10px; border-radius:999px; border:1.5px solid #1f2430; background:#fff; color:#1f2430; }
  .badge.cat { background:#a8e6cf; }
  .badge.effort { background:#c7e8ff; }
  .badge.time { background:#ffe3ef; }
  .last { margin-top:16px; font-size:14px; font-weight:800; color:#e0524f; }
  .btn-p { width:100%; height:54px; margin-top:18px; border:2px solid #1f2430; border-radius:16px; font-size:16px; font-weight:900; color:#fff;
           background:#ff6b6b; box-shadow:4px 4px 0 #1f2430; }
  .btn-s { width:100%; height:52px; margin-top:12px; border:2px solid #1f2430; border-radius:16px; font-size:15px; font-weight:800; background:#fff; color:#1f2430; box-shadow:4px 4px 0 #1f2430; }
  nav { position:absolute; bottom:0; left:0; right:0; background:#fff; border-top:2px solid #1f2430; display:flex; padding:8px 12px 14px; }
  nav a { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; font-size:11px; font-weight:800; color:#9aa0ab; text-decoration:none; padding:6px 0; border-radius:14px; }
  nav a.on { color:#1f2430; background:#ffd93d; margin:0 6px; border:2px solid #1f2430; }
  nav svg { width:23px; height:23px; }
</style>
</head>
<body>
<p class="banner">컨셉 5 · 플레이풀 팝 — 두꺼운 라인 + 하드 섀도 + 스티커 뱃지, 게임처럼 재미있는 무드</p>
<div class="app">
  <main>
    <p class="greet">오늘의 메뉴 뽑기 🎲</p>
    <h1>오늘 뭐<br><span class="hl">해드실래요?</span></h1>
    <p class="label">종류</p>
    <div class="chips">
      <button class="chip on">한식</button><button class="chip">중식</button><button class="chip">양식</button><button class="chip">일식</button><button class="chip">분식/기타</button>
    </div>
    <p class="label">노력</p>
    <div class="chips">
      <button class="chip on">쉬움</button><button class="chip">중간</button><button class="chip">어려움</button>
    </div>
    <button class="cta">추천받기 🎲</button>
    <div class="card">
      <span class="sticker">오늘의 추천!</span>
      <div class="dish-row">
        <div class="dish-emoji">🍲</div>
        <h2 class="dish-name">김치찌개</h2>
      </div>
      <div class="badges">
        <span class="badge cat">한식</span><span class="badge effort">쉬움</span><span class="badge time">30분</span><span class="badge">#국물</span><span class="badge">#밥</span>
      </div>
      <p class="last">🔥 마지막으로 먹은 지 12일 전</p>
      <button class="btn-p">이거 먹었어요 ✓</button>
      <button class="btn-s">다른 메뉴 볼래요</button>
    </div>
  </main>
  <nav>
    <a class="on" href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>홈</a>
    <a href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3v7a2 2 0 0 0 2 2h0V3"/><path d="M11 3v18"/><path d="M17 3c-1.5 1.5-2 4-2 6v3h3v9"/></svg>내 요리</a>
    <a href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>기록</a>
  </nav>
</div>
</body>
</html>
