<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>컨셉 3 · 프레시 글래스</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:"Pretendard Variable",Pretendard,sans-serif; }
  body { background:#e3edf7; }
  .banner { text-align:center; font-size:12px; color:#6b7684; padding:10px; }
  .app { max-width:400px; margin:0 auto; min-height:96vh; background:linear-gradient(180deg,#eaf4ff 0%,#f4fbf9 100%); position:relative; padding-bottom:88px; border-radius:24px; overflow:hidden; box-shadow:0 10px 40px rgba(60,110,180,.15); }
  .blob { position:absolute; border-radius:50%; filter:blur(55px); opacity:.5; pointer-events:none; }
  .b1 { width:220px; height:220px; background:#7fb5ff; top:-60px; right:-60px; }
  .b2 { width:180px; height:180px; background:#7de3d0; top:300px; left:-70px; }
  .b3 { width:160px; height:160px; background:#c9a7ff; bottom:60px; right:-50px; opacity:.35; }
  main { padding:48px 20px 24px; position:relative; }
  .greet { font-size:14px; font-weight:700; background:linear-gradient(90deg,#3182f6,#2ac1bc); -webkit-background-clip:text; background-clip:text; color:transparent; }
  h1 { font-size:27px; font-weight:800; line-height:1.3; color:#17202b; margin-top:6px; letter-spacing:-.5px; }
  .label { font-size:13px; font-weight:700; color:#5f6c7b; margin:22px 0 10px; }
  .chips { display:flex; flex-wrap:wrap; gap:8px; }
  .chip { height:38px; padding:0 15px; border-radius:999px; font-size:14px; font-weight:600; border:1px solid rgba(255,255,255,.8); background:rgba(255,255,255,.55); backdrop-filter:blur(10px); color:#44515f; }
  .chip.on { background:linear-gradient(135deg,#3182f6,#2ac1bc); color:#fff; border-color:transparent; box-shadow:0 4px 14px rgba(42,160,200,.35); }
  .cta { width:100%; height:56px; margin-top:30px; border:none; border-radius:18px; font-size:17px; font-weight:800; color:#fff;
         background:linear-gradient(135deg,#3182f6,#2ac1bc); box-shadow:0 10px 24px rgba(42,160,200,.35); }
  .card { margin-top:22px; background:rgba(255,255,255,.65); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
          border:1px solid rgba(255,255,255,.8); border-radius:26px; padding:24px; box-shadow:0 16px 40px rgba(70,120,180,.15); animation:pop .4s cubic-bezier(.16,1,.3,1); }
  @keyframes pop { from { opacity:0; transform:scale(.96) translateY(10px);} to { opacity:1; transform:none;} }
  .card-label { font-size:13px; font-weight:800; background:linear-gradient(90deg,#3182f6,#2ac1bc); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .dish-row { display:flex; align-items:center; gap:14px; margin-top:12px; }
  .dish-emoji { width:58px; height:58px; border-radius:20px; background:rgba(255,255,255,.8); border:1px solid rgba(255,255,255,.9); display:flex; align-items:center; justify-content:center; font-size:31px; }
  .dish-name { font-size:25px; font-weight:800; color:#17202b; letter-spacing:-.5px; }
  .badges { display:flex; flex-wrap:wrap; gap:6px; margin-top:14px; }
  .badge { font-size:12px; font-weight:700; padding:4px 10px; border-radius:999px; background:rgba(255,255,255,.7); border:1px solid rgba(255,255,255,.9); color:#44515f; }
  .badge.cat { color:#1f6fe0; }
  .last { margin-top:16px; font-size:13.5px; font-weight:700; color:#1f8a86; }
  .btn-p { width:100%; height:54px; margin-top:18px; border:none; border-radius:18px; font-size:16px; font-weight:800; color:#fff;
           background:linear-gradient(135deg,#3182f6,#2ac1bc); box-shadow:0 8px 20px rgba(42,160,200,.3); }
  .btn-s { width:100%; height:52px; margin-top:10px; border:1px solid rgba(255,255,255,.9); border-radius:18px; font-size:15px; font-weight:700; background:rgba(255,255,255,.55); color:#44515f; }
  nav { position:absolute; bottom:0; left:0; right:0; background:rgba(255,255,255,.7); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-top:1px solid rgba(255,255,255,.9); display:flex; padding:8px 12px 14px; }
  nav a { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; font-size:11px; font-weight:700; color:#7d8894; text-decoration:none; padding:6px 0; border-radius:14px; }
  nav a.on { color:#1f6fe0; background:rgba(255,255,255,.85); margin:0 6px; box-shadow:0 2px 8px rgba(70,120,180,.12); }
  nav svg { width:23px; height:23px; }
</style>
</head>
<body>
<p class="banner">컨셉 3 · 프레시 글래스 — 파스텔 그라디언트 배경 + 반투명 유리 카드, 산뜻하고 트렌디한 무드</p>
<div class="app">
  <div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>
  <main>
    <p class="greet">신선한 한 끼 어때요?</p>
    <h1>오늘 뭐<br>해드실래요?</h1>
    <p class="label">종류</p>
    <div class="chips">
      <button class="chip on">한식</button><button class="chip">중식</button><button class="chip">양식</button><button class="chip">일식</button><button class="chip">분식/기타</button>
    </div>
    <p class="label">노력</p>
    <div class="chips">
      <button class="chip on">쉬움</button><button class="chip">중간</button><button class="chip">어려움</button>
    </div>
    <button class="cta">추천받기</button>
    <div class="card">
      <p class="card-label">오늘의 추천 🌿</p>
      <div class="dish-row">
        <div class="dish-emoji">🍲</div>
        <h2 class="dish-name">김치찌개</h2>
      </div>
      <div class="badges">
        <span class="badge cat">한식</span><span class="badge">쉬움</span><span class="badge">30분</span><span class="badge">#국물</span><span class="badge">#밥</span>
      </div>
      <p class="last">🕐 마지막으로 먹은 지 12일 전</p>
      <button class="btn-p">이거 먹었어요 ✓</button>
      <button class="btn-s">다른 메뉴 볼래요</button>
    </div>
  </main>
  <nav>
    <a class="on" href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>홈</a>
    <a href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3v7a2 2 0 0 0 2 2h0V3"/><path d="M11 3v18"/><path d="M17 3c-1.5 1.5-2 4-2 6v3h3v9"/></svg>내 요리</a>
    <a href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>기록</a>
  </nav>
</div>
</body>
</html>
